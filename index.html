<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>openclaw · 小游戏合集</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0b1020;color:#fff;font-family:system-ui,-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",Arial;}
    .card{width:min(860px,92vw);padding:18px;border-radius:16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);box-shadow:0 18px 60px rgba(0,0,0,.35)}
    h1{margin:0 0 10px;font-size:18px}
    p{margin:8px 0;color:rgba(255,255,255,.72);line-height:1.5;font-size:13px}
    a{color:#7cfc00;text-decoration:none;font-weight:700}
    .list{margin-top:12px;display:grid;gap:10px}
    .item{padding:12px;border-radius:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);display:flex;justify-content:space-between;align-items:center;gap:10px}
    code{color:rgba(255,255,255,.75)}
  </style>
</head>
<body>
  <div class="card">
    <h1>openclaw · 小游戏合集</h1>
    <p>每个小游戏都放在 <code>games/&lt;name&gt;/</code> 目录下，彼此独立。</p>
    <div class="list">
      <div class="item">
        <div><b>贪吃蛇</b><div style="font-size:12px;color:rgba(255,255,255,.65)">games/snake/index.html</div></div>
        <a href="games/snake/index.html">开始游戏 →</a>
      </div>
      <div class="item">
        <div><b>坦克大战</b><div style="font-size:12px;color:rgba(255,255,255,.65)">games/tank/index.html</div></div>
        <a href="games/tank/index.html">开始游戏 →</a>
      </div>
      <div class="item">
        <div><b>扫雷</b><div style="font-size:12px;color:rgba(255,255,255,.65)">games/minesweeper/index.html</div></div>
        <a href="games/minesweeper/index.html">开始游戏 →</a>
      </div>
      <div class="item">
        <div><b>俄罗斯方块</b><div style="font-size:12px;color:rgba(255,255,255,.65)">games/tetris/index.html</div></div>
        <a href="games/tetris/index.html">开始游戏 →</a>
      </div>
    </div>
    <p style="margin-top:14px;">Made for 大当家 · 二当家出品</p>
  </div>
</body>
</html>
